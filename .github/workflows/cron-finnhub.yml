name: Finnhub Data Collection

on:
  schedule:
    - cron: '0 0 * * *' # 매일 09:00 KST (UTC 00:00)
  workflow_dispatch: # 수동 트리거

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Collect Finnhub data (chunked)
        env:
          API_URL: https://securitya.vercel.app/api/cron/finnhub-collect
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          echo "=== Finnhub 데이터 수집 시작 ==="
          for i in $(seq 1 120); do
            echo ""
            echo "--- Chunk $i ---"
            response=$(curl -s -w "\n%{http_code}" "$API_URL" \
              -H "Authorization: Bearer $CRON_SECRET" \
              --max-time 30)
            http_code=$(echo "$response" | tail -1)
            body=$(echo "$response" | sed '$d')

            echo "HTTP: $http_code"
            echo "$body" | jq '.' 2>/dev/null || echo "$body"

            if [ "$http_code" != "200" ]; then
              echo "Error: HTTP $http_code"
              exit 1
            fi

            status=$(echo "$body" | jq -r '.status' 2>/dev/null)
            if [ "$status" = "completed" ] || [ "$status" = "already_completed" ]; then
              echo ""
              echo "=== 배치 완료! ==="
              exit 0
            fi

            echo "Waiting 10s for rate limit..."
            sleep 10
          done

          echo "Warning: 120 chunks processed but batch not completed"
          exit 1
