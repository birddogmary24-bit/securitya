name: Finnhub Data Collection

on:
  schedule:
    - cron: '30 21 * * *' # UTC 21:30 = KST 06:30 (서머타임: ET 17:30, 겨울: ET 16:30 — 미국 장 마감 후)
  workflow_dispatch: # 수동 트리거

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: cd app && npm ci

      - name: Collect Finnhub data
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: cd app && npx tsx scripts/collect-finnhub.ts

      - name: Generate per-stock AI analysis cache
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: cd app && npx tsx scripts/generate-stock-analysis.ts
